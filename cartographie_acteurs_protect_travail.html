
<style>
*{box-sizing:border-box;margin:0;padding:0}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem;padding-top:.5rem}
.pill{font-size:11px;padding:4px 10px;border-radius:20px;border:0.5px solid var(--color-border-secondary);cursor:pointer;background:transparent;color:var(--color-text-secondary);transition:all .15s}
.pill.on{background:var(--color-background-secondary);color:var(--color-text-primary);border-color:var(--color-border-primary)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:.85rem 1rem;cursor:pointer;transition:border-color .15s}
.card:hover{border-color:var(--color-border-secondary)}
.card.hi{border-left:3px solid var(--color-border-danger);border-radius:0 var(--border-radius-lg) var(--border-radius-lg) 0}
.card.med{border-left:3px solid var(--color-border-warning);border-radius:0 var(--border-radius-lg) var(--border-radius-lg) 0}
.card.lo{border-left:3px solid var(--color-border-success);border-radius:0 var(--border-radius-lg) var(--border-radius-lg) 0}
.card-cat{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px}
.card-cat.syn{color:var(--color-text-info)}
.card-cat.inst{color:var(--color-text-warning)}
.card-cat.jur{color:var(--color-text-danger)}
.card-cat.asso{color:var(--color-text-success)}
.card-cat.med2{color:var(--color-text-secondary)}
.card-cat.pro{color:#854F0B}
.card-name{font-size:13px;font-weight:500;color:var(--color-text-primary);margin-bottom:3px}
.card-sub{font-size:11px;color:var(--color-text-secondary);line-height:1.4}
.badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:10px;margin-top:5px}
.badge.hi{background:var(--color-background-danger);color:var(--color-text-danger)}
.badge.med{background:var(--color-background-warning);color:var(--color-text-warning)}
.badge.lo{background:var(--color-background-success);color:var(--color-text-success)}
.panel{background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-lg);padding:1.1rem 1.25rem;margin-top:1rem}
.panel h3{font-size:15px;font-weight:500;margin-bottom:.4rem}
.panel-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:.75rem}
.meta-tag{font-size:11px;padding:3px 8px;border-radius:8px;background:var(--color-background-secondary);color:var(--color-text-secondary)}
.panel p{font-size:13px;color:var(--color-text-secondary);line-height:1.65;margin-bottom:.5rem}
.panel ul{padding-left:1.1rem;font-size:13px;color:var(--color-text-secondary);line-height:1.7}
.close-x{float:right;background:none;border:none;cursor:pointer;color:var(--color-text-tertiary);font-size:16px;line-height:1}
.count{font-size:12px;color:var(--color-text-tertiary);margin-bottom:.75rem}
</style>

<h2 class="sr-only">Cartographie des acteurs clés pour Protect Travail — Tarn-et-Garonne et Occitanie</h2>

<div class="filters">
  <button class="pill on" onclick="filter('all',this)">Tous</button>
  <button class="pill" onclick="filter('syn',this)">Syndicats</button>
  <button class="pill" onclick="filter('inst',this)">Institutions</button>
  <button class="pill" onclick="filter('jur',this)">Juridique</button>
  <button class="pill" onclick="filter('asso',this)">Associations</button>
  <button class="pill" onclick="filter('pro',this)">Pros du travail</button>
  <button class="pill" onclick="filter('med2',this)">Médias</button>
  <span style="margin-left:auto;display:flex;gap:6px;align-items:center">
    <button class="pill on" id="f-hi" onclick="filterPrio('hi',this)">Priorité haute</button>
    <button class="pill on" id="f-med" onclick="filterPrio('med',this)">Moyenne</button>
    <button class="pill on" id="f-lo" onclick="filterPrio('lo',this)">Longue portée</button>
  </span>
</div>

<div class="count" id="count">Affichage de tous les acteurs</div>

<div class="grid" id="grid"></div>

<div class="panel" id="panel" style="display:none">
  <button class="close-x" onclick="document.getElementById('panel').style.display='none'">✕</button>
  <h3 id="p-name"></h3>
  <div class="panel-meta" id="p-meta"></div>
  <p id="p-desc"></p>
  <div id="p-actions"></div>
  <div style="margin-top:.75rem;display:flex;gap:8px;flex-wrap:wrap" id="p-btns"></div>
</div>

   actions:["Rencontre avec le directeur de la MJD","Négociation d'un créneau de permanence conjoint","Intégrer la MJD dans les circuits d'orientation"],

  {id:25,cat:'med2',name:'Actu 82 / France Bleu',sub:'Web & radio locale',prio:'med',
   desc:"Actu.fr couvre l'actualité locale de Tarn-et-Garonne avec une forte audience numérique. France Bleu Occitanie touche un public large en matinale. Deux cibles pour le lancement.",
   actions:["Envoyer le communiqué de presse à Actu82","Proposer une interview en direct à France Bleu Occitanie"],
   contact:"Actu82 — actu.fr/tarn-et-garonne"},
];

let activeFilter = 'all';
let activePrios = new Set(['hi','med','lo']);

function render(){
  const g = document.getElementById('grid');
  const visible = ACTORS.filter(a =>
    (activeFilter==='all' || a.cat===activeFilter) && activePrios.has(a.prio)
  );
  document.getElementById('count').textContent = visible.length + ' acteur' + (visible.length>1?'s':'') + ' affiché' + (visible.length>1?'s':'');
  g.innerHTML = visible.map(a=>`
    <div class="card ${a.prio}" onclick="showPanel(${a.id})">
      <div class="card-cat ${a.cat}">${catLabel(a.cat)}</div>
      <div class="card-name">${a.name}</div>
      <div class="card-sub">${a.sub}</div>
      <span class="badge ${a.prio}">${prioLabel(a.prio)}</span>
    </div>`).join('');
}

function catLabel(c){return{syn:'Syndicat',inst:'Institution',jur:'Juridique',asso:'Association',pro:'Pro du travail',med2:'Médias'}[c]}
function prioLabel(p){return{hi:'Priorité haute',med:'Phase 2',lo:'Long terme'}[p]}

function filter(cat,btn){
  activeFilter=cat;
  document.querySelectorAll('.filters .pill').forEach(b=>{
    if(['f-hi','f-med','f-lo'].includes(b.id)) return;
    b.classList.remove('on');
  });
  btn.classList.add('on');
  render();
}

function filterPrio(p,btn){
  if(activePrios.has(p)) activePrios.delete(p); else activePrios.add(p);
  btn.classList.toggle('on', activePrios.has(p));
  render();
}

function showPanel(id){
  const a = ACTORS.find(x=>x.id===id);
  document.getElementById('p-name').textContent = a.name;
  document.getElementById('p-meta').innerHTML =
    `<span class="meta-tag">${catLabel(a.cat)}</span>` +
    `<span class="meta-tag">${a.sub}</span>` +
    `<span class="badge ${a.prio}" style="font-size:11px;padding:3px 8px">${prioLabel(a.prio)}</span>`;
  document.getElementById('p-desc').textContent = a.desc;
  document.getElementById('p-actions').innerHTML =
    '<p style="font-size:12px;font-weight:500;color:var(--color-text-secondary);margin:.5rem 0 .25rem">Actions à mener</p>' +
    '<ul>' + a.actions.map(x=>`<li>${x}</li>`).join('') + '</ul>';
  document.getElementById('p-btns').innerHTML =
    `<button onclick="sendPrompt('Rédige un email de prise de contact avec ${a.name} pour présenter Protect Travail')" style="font-size:12px">Rédiger l'email de contact ↗</button>` +
    `<button onclick="sendPrompt('Quels arguments mettre en avant pour convaincre ${a.name} de signer un partenariat avec Protect Travail ?')" style="font-size:12px">Stratégie de partenariat ↗</button>`;
  document.getElementById('panel').style.display = 'block';
}

render();
</script>
